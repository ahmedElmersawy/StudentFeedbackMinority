# Feedback Atlas — development compose (models mounted as volumes)
#
#   docker compose up --build
#   → App:      http://localhost
#   → API docs: http://localhost:8000/docs

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      CORS_ORIGINS: "http://localhost,http://localhost:80,http://frontend"
      TOKENIZERS_PARALLELISM: "false"
    volumes:
      - ./catme_feedback_classifier:/app/catme_feedback_classifier:ro
      - ./professor_feedback_classifier:/app/professor_feedback_classifier:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ""        # empty = nginx proxies /health /upload /jobs to backend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
