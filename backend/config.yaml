    - "first in family"
    - "first in my family"
    - "parents didn't go to college"
    - "unfamiliar with university"
    - "feeling out of place"
    - "imposter syndrome"
    - "first to attend"
    - "don't belong"
    # peer-written (CATME) — rare but possible
