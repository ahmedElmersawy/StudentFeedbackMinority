model:
  base_model: "distilroberta-base"
  max_length: 256
  batch_size: 64
  catme_output_dir: "catme_feedback_classifier"
  professor_output_dir: "professor_feedback_classifier"

training:
  num_epochs: 10
  batch_size: 16
  body_lr: 1.0e-5       # encoder layers (slow — preserve pretrained knowledge)
  head_lr: 1.0e-3       # classifier head (fast — learn the new task)
  learning_rate: 3.0e-5  # fallback if differential LR not used
  warmup_ratio: 0.1
  weight_decay: 0.01
  early_stopping_patience: 3
  early_stopping_metric: "minority_f1_mean"
  minority_class_weight_multiplier: 3.0
  test_size: 0.2
  random_state: 42
  fp16: true
  undersample_ratio: 3  # cap every class at 3× the second-largest class (applied per-label, not just dominant)
  # Labels that should NOT get the minority weight multiplier — they are common and
  # getting extra weight would cause the model to over-predict them.
  non_minority_labels:
    - "Majority_Positive"
    - "Self_Positive"
  eval_strategy: "steps"   # "steps" for large datasets, "epoch" for small
  eval_steps: 10000         # evaluate every 10K steps (avoids 75-min epoch waits)

embeddings:
  model: "all-MiniLM-L6-v2"
  batch_size: 64

minority_detection:
  contamination: 0.08
  n_estimators: 200
  dbscan_eps: 0.75
  dbscan_min_samples: 5
  min_cluster_size: 10
  include_dbscan_noise: false
  # Suppress IsolationForest outliers that have a purely positive prediction.
  # A statistically-unusual "great course!" is not a useful minority signal.
  suppress_positive_outliers: true
  # Detect same-professor/student mixed signals (positive on X, negative on Y).
  mixed_signal_detection: true
  # Column names to try for grouping rows by the same person/entity.
  entity_id_columns:
    - "teacher_id"
    - "professor_id"
    - "instructor_id"
    - "student_id"
    - "id"
    - "name"
    - "prof_name"
    - "teacher"
    - "instructor"

zero_shot:
  model: "facebook/bart-large-mnli"
  batch_size: 32
  confidence_threshold: 0.5
  cache_path: "../zero_shot_labels_cache.json"

mismatch:
  high_rating_threshold: 3.8
  low_rating_threshold: 2.5

review_queue:
  confidence_threshold: 0.65

anonymization:
  placeholder: "[STUDENT]"
  spacy_model: "en_core_web_sm"

# ---------------------------------------------------------------------------
# Label sets
# ---------------------------------------------------------------------------

labels:
  # Student→Student: peer_feedback subtype (7 labels)
  peer:
    - "Negative_Contribution"
    - "Negative_Communication"
    - "Negative_Reliability"
    - "Negative_Attitude"
    - "Suggestion_To_Peer"
    - "Minority_Peer_Experience"
    - "Majority_Positive"

  # Student→Student: self_assessment subtype (4 labels)
  self:
    - "Self_Struggle"
    - "Self_Minority_Reveal"
    - "Self_Suggestion"
    - "Self_Positive"

  # Student→Professor (17 labels across RMP + courseeval)
  professor:
    - "Teaching_Positive_Clarity"
    - "Teaching_Positive_Engagement"
    - "Teaching_Negative_Clarity"
    - "Teaching_Negative_Pace"
    - "Teaching_Negative_Inclusivity"
    - "Content_Positive_Relevance"
    - "Content_Positive_Depth"
    - "Content_Negative_Outdated"
    - "Content_Negative_Misaligned"
    - "Content_Negative_Accessibility"
    - "Exam_Positive_Fair"
    - "Exam_Negative_Unfair"
    - "Exam_Negative_Structure"
    - "Exam_Negative_Accessibility"
    - "Lab_Positive"
    - "Lab_Negative_Equipment"
    - "Lab_Negative_Organization"
    - "Lab_Negative_Accessibility"
    - "Support_Positive"
    - "Support_Negative_Availability"
    - "Support_Negative_Quality"
    - "Support_Negative_Equity"
    - "Minority_Student_Experience"
    - "Majority_Positive"

  # Legacy broad labels (kept for backward compat)
  course:
    - "Positive_Teaching"
    - "Positive_Content"
    - "Positive_Support"
    - "Negative_Teaching"
    - "Negative_Workload"
    - "Negative_Assessment"
    - "Negative_Support"
    - "Neutral"

  broad:
    - "Positive"
    - "Neutral"
    - "Negative"

# Zero-shot candidate strings for each mode/subtype (maps to label_map in pipeline)
zero_shot_candidates:
  peer_feedback:
    - "teammate did not contribute, do their work, dropped out, or quit the team"
    - "teammate did not respond to messages, was hard to reach, or went silent throughout the project"
    - "teammate missed meetings or deadlines repeatedly"
    - "teammate caused conflict or had a bad attitude toward the team"
    - "the main point of this comment is a specific actionable suggestion for how the teammate should improve, not just praise with a minor note"
    - "teammate explicitly faces barriers due to language, disability, race, gender, or immigration status"
    - "comment is overall positive praise for the teammate with no significant criticism"

  self_assessment:
    - "student acknowledges they underperformed or struggled"
    - "student describes a personal hardship or barrier"
    - "student recommends what they would do differently"
    - "student describes their positive contribution"

  professor:
    - "professor explains clearly and teaches well"
    - "professor is engaging and passionate"
    - "professor is hard to follow or reads from slides"
    - "course pace is too fast or disorganized"
    - "teaching excludes students from certain backgrounds"
    - "course content is relevant and up to date"
    - "course content is rigorous and comprehensive"
    - "course content is outdated or misaligned with exams"
    - "course content does not match what is tested on exams"
    - "course content assumes prior knowledge not listed"
    - "exam is fair and reflects what was taught"
    - "exam is unfair or tests untaught material"
    - "exam has bad weighting or no partial credit"
    - "accommodation or accessibility failure in exam"
    - "lab is hands-on and well organized"
    - "lab equipment is broken or instructions are unclear"
    - "lab is poorly organized or sessions are badly scheduled"
    - "lab scheduling or location creates barriers"
    - "professor is responsive and supportive"
    - "professor is unavailable or dismissive"
    - "quality of professor support or feedback is poor"
    - "professor gives unequal support to certain students"
    - "student from minority background describing a barrier"
    - "generic positive feedback about the course"

# Zero-shot label_map: candidate string → label name
zero_shot_label_map:
  peer_feedback:
    "teammate did not contribute, do their work, dropped out, or quit the team": "Negative_Contribution"
    "teammate did not respond to messages, was hard to reach, or went silent throughout the project": "Negative_Communication"
    "teammate missed meetings or deadlines repeatedly": "Negative_Reliability"
    "teammate caused conflict or had a bad attitude toward the team": "Negative_Attitude"
    "the main point of this comment is a specific actionable suggestion for how the teammate should improve, not just praise with a minor note": "Suggestion_To_Peer"
    "teammate explicitly faces barriers due to language, disability, race, gender, or immigration status": "Minority_Peer_Experience"
    "comment is overall positive praise for the teammate with no significant criticism": "Majority_Positive"

  self_assessment:
    "student acknowledges they underperformed or struggled": "Self_Struggle"
    "student describes a personal hardship or barrier": "Self_Minority_Reveal"
    "student recommends what they would do differently": "Self_Suggestion"
    "student describes their positive contribution": "Self_Positive"

  professor:
    "professor explains clearly and teaches well": "Teaching_Positive_Clarity"
    "professor is engaging and passionate": "Teaching_Positive_Engagement"
    "professor is hard to follow or reads from slides": "Teaching_Negative_Clarity"
    "course pace is too fast or disorganized": "Teaching_Negative_Pace"
    "teaching excludes students from certain backgrounds": "Teaching_Negative_Inclusivity"
    "course content is relevant and up to date": "Content_Positive_Relevance"
    "course content is rigorous and comprehensive": "Content_Positive_Depth"
    "course content is outdated or misaligned with exams": "Content_Negative_Outdated"
    "course content does not match what is tested on exams": "Content_Negative_Misaligned"
    "course content assumes prior knowledge not listed": "Content_Negative_Accessibility"
    "exam is fair and reflects what was taught": "Exam_Positive_Fair"
    "exam is unfair or tests untaught material": "Exam_Negative_Unfair"
    "exam has bad weighting or no partial credit": "Exam_Negative_Structure"
    "accommodation or accessibility failure in exam": "Exam_Negative_Accessibility"
    "lab is hands-on and well organized": "Lab_Positive"
    "lab equipment is broken or instructions are unclear": "Lab_Negative_Equipment"
    "lab is poorly organized or sessions are badly scheduled": "Lab_Negative_Organization"
    "lab scheduling or location creates barriers": "Lab_Negative_Accessibility"
    "professor is responsive and supportive": "Support_Positive"
    "professor is unavailable or dismissive": "Support_Negative_Availability"
    "quality of professor support or feedback is poor": "Support_Negative_Quality"
    "professor gives unequal support to certain students": "Support_Negative_Equity"
    "student from minority background describing a barrier": "Minority_Student_Experience"
    "generic positive feedback about the course": "Majority_Positive"

# ---------------------------------------------------------------------------
# Aggregation — professor/dimension-level summary
# ---------------------------------------------------------------------------

aggregation:
  # Minimum number of students who must share a label before it becomes a finding.
  # Below this it could be one outlier, not a pattern.
  min_students_threshold: 3
  # Percentage of responses that must carry a label to flag it as a concern.
  min_pct_threshold: 10.0
  # Column names to try as the entity grouping key (professor ID, course ID…).
  # Falls back to 'dimension' column when none is found.
  entity_id_columns:
    - "teacher_id"
    - "professor_id"
    - "instructor_id"
    - "course_id"
    - "student_id"
    - "name"
    - "prof_name"
    - "teacher"
    - "instructor"

# RMP emotional_label → initial pseudo-label mapping
rmp_label_map:
  awesome: "Teaching_Positive_Engagement"
  good: "Teaching_Positive_Clarity"
  average: "Majority_Positive"
  poor: "Teaching_Negative_Clarity"
  awful: "Teaching_Negative_Clarity"

# ---------------------------------------------------------------------------
# Priority scoring
# ---------------------------------------------------------------------------

priority:
  high:
    - "Negative_Contribution"
    - "Negative_Communication"
    - "Negative_Reliability"
    - "Negative_Attitude"
    - "Teaching_Negative_Inclusivity"
    - "Exam_Negative_Accessibility"
    - "Support_Negative_Equity"
    - "Minority_Peer_Experience"
    - "Minority_Student_Experience"
    - "Self_Minority_Reveal"
    - "Mixed_Signal_Pattern"
  medium:
    - "Suggestion_To_Peer"
    - "Self_Struggle"
    - "Teaching_Negative_Clarity"
    - "Teaching_Negative_Pace"
    - "Content_Negative_Misaligned"
    - "Content_Negative_Accessibility"
    - "Exam_Negative_Unfair"
    - "Exam_Negative_Structure"
    - "Support_Negative_Availability"
    - "Support_Negative_Quality"
    - "Lab_Negative_Equipment"
    - "Lab_Negative_Organization"
    - "Lab_Negative_Accessibility"
  deprioritized:
    - "Majority_Positive"
    - "Self_Positive"
    - "Teaching_Positive_Clarity"
    - "Teaching_Positive_Engagement"
    - "Content_Positive_Relevance"
    - "Content_Positive_Depth"
    - "Exam_Positive_Fair"
    - "Lab_Positive"
    - "Support_Positive"

