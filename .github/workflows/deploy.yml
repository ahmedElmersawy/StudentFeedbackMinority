name: Deploy Feedback Atlas

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND:  ghcr.io/${{ github.repository }}/backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/frontend

jobs:
  # ── 1. Type-check & build ────────────────────────────────────────────────────
  check:
    name: Type-check & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: npm install
        working-directory: frontend

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Vite build
        run: npx vite build
        working-directory: frontend

      - name: Backend syntax check
        run: |
          python3 -m py_compile backend/main.py
          python3 -m py_compile backend/pipeline.py
          python3 -m py_compile backend/minority_detector.py
          echo "Backend syntax OK"

  # ── 2. Build and push Docker images ─────────────────────────────────────────
  build:
    name: Build images
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_BACKEND }}:latest,${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}:latest,${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 3a. Deploy backend to Fly.io ─────────────────────────────────────────────
  deploy-fly:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: build
    if: vars.DEPLOY_TARGET == 'fly'
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ── 3b. Deploy to Railway ────────────────────────────────────────────────────
  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: vars.DEPLOY_TARGET == 'railway'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy backend
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: backend

  # ── 3c. Deploy frontend to Vercel ────────────────────────────────────────────
  deploy-vercel:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: vars.DEPLOY_TARGET == 'vercel' || vars.DEPLOY_TARGET == 'fly'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: frontend
      - run: npx vite build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend/dist
          vercel-args: "--prod"
